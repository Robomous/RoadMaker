name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build+test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: ci-macos
          - os: ubuntu-latest
            preset: ci-linux
          - os: windows-latest
            preset: ci-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja + CMake
        uses: lukka/get-cmake@latest


      - name: Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl1-mesa-dev
          libegl1 libfontconfig1 libxkbcommon-x11-0
          libdbus-1-3 libglib2.0-0t64
          libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1
          libxcb-randr0 libxcb-render-util0 libxcb-shape0
          libxcb-xinerama0 libxcb-xkb1

      - name: MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: |
            .qt
            !.qt/venv
          key: qt-${{ runner.os }}-${{ hashFiles('cmake/QtVersion.cmake', 'scripts/setup_qt.py') }}

      - name: Provision Qt
        run: python3 scripts/setup_qt.py

      # gtest_discover_tests runs the editor test exe during the build; the
      # dynamically linked Qt DLLs must be loadable. Version comes from the
      # provisioned tree, not hardcoded (pin lives in cmake/QtVersion.cmake).
      - name: Qt DLLs on PATH (Windows test discovery)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Resolve-Path .qt/*/msvc*/bin | ForEach-Object { Add-Content $env:GITHUB_PATH $_.Path }

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-build
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}

      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/*/_deps/*-subbuild/*-populate-prefix/src/*.tar.gz
          key: deps-${{ matrix.os }}-${{ hashFiles('cmake/deps.cmake') }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  shared-core:
    name: shared kernel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-shared
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps/*-subbuild/*-populate-prefix/src/*.tar.gz
          key: deps-${{ matrix.os }}-${{ hashFiles('cmake/deps.cmake') }}
      # Hidden visibility + explicit exports: a missed RM_API is a link error
      # here; the install+consume step proves the CMake package works outside
      # the build tree.
      - name: Configure (shared kernel, no editor)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release -DRM_WERROR=ON
          -DRM_BUILD_SHARED=ON -DRM_BUILD_TESTS=ON -DRM_BUILD_EDITOR=OFF
      - name: Build
        run: cmake --build build
      - name: Test against the shared kernel
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: cmake --install build --prefix _inst
      - name: Consume installed package
        run: >
          cmake -S tests/consume_installed -B build-consume -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/_inst
      - name: Build + run consumer
        # PATH prepend: on Windows the consumer must find the installed
        # roadmaker_core.dll in _inst/bin; harmless on Linux/macOS (rpath).
        run: |
          cmake --build build-consume
          PATH="$PWD/_inst/bin:$PATH" ./build-consume/consume_smoke
        shell: bash

  sanitize:
    name: ASan+UBSan (Linux clang)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Linux Qt runtime deps
        run: >
          sudo apt-get update && sudo apt-get install -y
          libgl1-mesa-dev libegl1 libfontconfig1 libxkbcommon-x11-0
          libdbus-1-3 libglib2.0-0t64
          libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1
          libxcb-randr0 libxcb-render-util0 libxcb-shape0
          libxcb-xinerama0 libxcb-xkb1
      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: |
            .qt
            !.qt/venv
          key: qt-${{ runner.os }}-${{ hashFiles('cmake/QtVersion.cmake', 'scripts/setup_qt.py') }}
      - name: Provision Qt
        run: python3 scripts/setup_qt.py
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: sanitize
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps/*-subbuild/*-populate-prefix/src/*.tar.gz
          key: deps-sanitize-${{ hashFiles('cmake/deps.cmake') }}
      # Editor included: ASan surfaces signal/slot lifetime bugs.
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DRM_BUILD_TESTS=ON -DRM_BUILD_EDITOR=ON
          -DRM_SANITIZE=address,undefined
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1
      # Interactive soak (hardening sprint §4.3, #86): ~10 minutes of
      # seeded-random editing ops over the real Document/command stack under
      # ASan+UBSan. The seed derives from the run id — varied coverage across
      # runs, and any failure prints its seed for a one-line local repro.
      - name: Soak (10 min, seeded)
        run: ./build/editor/tests/roadmaker_soak --minutes 9 --seed $(( ${{ github.run_id }} % 1000000 ))
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1

  visual-artifacts:
    name: editor visual artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Renders the canonical scenes (4-arm crossing, the tee, an overpass)
    # through the editor's --screenshot mode and uploads the PNGs for HUMAN
    # review — metrics gate correctness, the maintainer gates appearance
    # (docs/standards/product-parity.md). Not a pixel-diff: the artifacts
    # exist so a reviewer can look at what the editor actually draws.
    # Skip-not-fail: a runner without usable GL skips the renders (exit 3
    # from the editor, absorbed by --skip-on-no-gl) instead of failing CI.
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - name: Linux Qt runtime deps + xvfb + Mesa
        run: >
          sudo apt-get update && sudo apt-get install -y
          xvfb libgl1-mesa-dev libgl1-mesa-dri libegl1 libfontconfig1
          libxkbcommon-x11-0 libdbus-1-3 libglib2.0-0t64
          libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1
          libxcb-randr0 libxcb-render-util0 libxcb-shape0
          libxcb-xinerama0 libxcb-xkb1
      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: |
            .qt
            !.qt/venv
          key: qt-${{ runner.os }}-${{ hashFiles('cmake/QtVersion.cmake', 'scripts/setup_qt.py') }}
      - name: Provision Qt
        run: python3 scripts/setup_qt.py
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: visual-artifacts
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/*/_deps/*-subbuild/*-populate-prefix/src/*.tar.gz
          key: deps-ubuntu-latest-${{ hashFiles('cmake/deps.cmake') }}
      - name: Configure
        run: cmake --preset ci-linux
      - name: Build editor
        run: cmake --build --preset ci-linux --target roadmaker-editor
      - name: Render canonical scenes
        run: |
          mkdir -p shots
          for scene in crossing t_attach overpass; do
            for camera in orbit top; do
              xvfb-run -a python3 scripts/editor_screenshot.py \
                "assets/samples/${scene}.xodr" "shots/${scene}_${camera}.png" \
                --camera "$camera" --skip-on-no-gl
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: editor-screenshots
          path: shots/
          if-no-files-found: warn # GL-less runner skipped the renders

  format:
    name: clang-format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          git ls-files '*.cpp' '*.hpp' | xargs clang-format --dry-run --Werror
      - name: Check asset licenses
        run: python3 scripts/check_asset_licenses.py

  python:
    name: Python wheel + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: python
      - name: Build wheel
        run: pip wheel python/ -w dist -v
      - name: Install wheel + pytest
        run: |
          pip install dist/roadmaker-*.whl pytest
          pytest python/tests -q
      - name: Export sample .glb artifacts (visual check)
        run: |
          python python/examples/load_and_export.py assets/samples/t_junction.xodr t_junction.glb
          python python/examples/author_road.py authored.xodr authored.glb
      - uses: actions/upload-artifact@v4
        with:
          name: sample-glb
          path: |
            t_junction.glb
            authored.glb
            authored.xodr

  fuzz-smoke:
    name: xodr fuzz smoke (30 s)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: fuzz
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DRM_BUILD_TESTS=ON -DRM_BUILD_FUZZERS=ON
      - name: Build fuzzer
        run: cmake --build build --target roadmaker_fuzz_xodr
      - name: Run 30 s smoke
        run: ./build/core/tests/fuzz/roadmaker_fuzz_xodr core/tests/fuzz/corpus -max_total_time=30 -print_final_stats=1

  usd-export:
    name: USD export (usdchecker)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # The OpenUSD exporter is gated behind RM_BUILD_USD (off in the default
    # matrix and in wheels). This dedicated job builds it ON, runs the golden
    # gtests + the USD Python binding, and validates the exported .usda against
    # the OpenUSD reference implementation (usdchecker from usd-core).
    env:
      TMPDIR: /tmp # keep the gtest golden path predictable for usdchecker
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/get-cmake@latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: usd-export
      - name: Cache FetchContent downloads
        uses: actions/cache@v4
        with:
          path: build/_deps/*-subbuild/*-populate-prefix/src/*.tar.gz
          key: deps-usd-${{ hashFiles('cmake/deps.cmake') }}
      - name: Install usd-core (usdchecker) + nanobind
        run: pip install usd-core nanobind
      - name: Configure (RM_BUILD_USD=ON, kernel + tests + Python binding)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DRM_BUILD_USD=ON -DRM_BUILD_TESTS=ON -DRM_BUILD_PYTHON=ON
          -DRM_BUILD_EDITOR=OFF -DRM_WERROR=ON
      - name: Build
        run: cmake --build build
      - name: Golden gtests (writes /tmp/rm_usd_golden.usda)
        run: ctest --test-dir build --output-on-failure -R '^Usd\.'
      # usd-core ships the pxr Python modules but not the usdchecker CLI, so we
      # drive its compliance engine (UsdUtils.ComplianceChecker) directly.
      - name: Validate exported .usda against the OpenUSD reference checker
        run: python scripts/usd_compliance_check.py /tmp/rm_usd_golden.usda

  esmini-roundtrip:
    name: esmini round-trip smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Cross-cutting quality gate owned by M3a, then permanent (issue #51,
    # docs/design/m3a/05_editor_and_docs.md §4): every tracked .xodr — and,
    # from #73 on, every golden scene export — must load headless in esmini
    # without errors. esmini (MPL-2.0) is an EXTERNAL smoke tool: a pinned
    # release binary fetched like a test fixture, never linked into any
    # RoadMaker target, never redistributed (docs/standards/dependencies.md).
    env:
      ESMINI_VERSION: v3.5.0
    steps:
      - uses: actions/checkout@v4
      - name: Cache esmini
        id: esmini-cache
        uses: actions/cache@v4
        with:
          path: .esmini
          key: esmini-${{ runner.os }}-v3.5.0
      - name: Fetch pinned esmini release binary
        if: steps.esmini-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o esmini.zip "https://github.com/esmini/esmini/releases/download/${ESMINI_VERSION}/esmini-bin_Linux.zip"
          mkdir -p .esmini && unzip -q esmini.zip -d .esmini
          chmod +x .esmini/esmini/bin/esmini
      # The esmini binary links GL/X11 through OpenSceneGraph even when run
      # --headless; keep the runtime deps explicit rather than relying on
      # what happens to be on the runner image.
      - name: esmini runtime deps
        run: sudo apt-get update && sudo apt-get install -y libgl1 libx11-6 libxrandr2 libxinerama1
      - name: Smoke-load every tracked .xodr
        run: python3 scripts/esmini_smoke.py --esmini .esmini/esmini/bin/esmini assets/samples/*.xodr
      - name: Broken fixture must fail (guards the gate itself)
        run: python3 scripts/esmini_smoke.py --esmini .esmini/esmini/bin/esmini --expect-fail tests/esmini/broken.xodr

  docs:
    name: docs link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # Offline mode: verifies every relative link and anchor inside the
      # repo deterministically; external URLs are deliberately not fetched
      # so the gate cannot flake on third-party outages.
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --no-progress
            "docs/**/*.md"
            "*.md"
          fail: true
